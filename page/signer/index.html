<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EggyHub 授权码生成器</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* 自定义按钮颜色及交互 */
        .btn-primary {
            background-color: #0096ff;
            color: white;
            transition: background-color 0.2s;
            outline: none;
        }
        .btn-primary:hover {
            background-color: #0077cc;
        }
        .btn-primary:active {
            background-color: #0066aa;
        }
        .btn-primary:focus {
            outline: none;
            box-shadow: none;
        }
        .btn-generate {
            background-color: #0096ff;
            color: white;
            transition: background-color 0.2s;
            outline: none;
        }
        .btn-generate:hover {
            background-color: #0077cc;
        }
        .btn-generate:active {
            background-color: #0066aa;
        }
        .btn-generate:focus {
            outline: none;
            box-shadow: none;
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: #1f2937;
            transition: background-color 0.2s;
            outline: none;
        }
        .btn-secondary:hover {
            background-color: #d1d5db;
        }
        .btn-secondary:active {
            background-color: #9ca3af;
        }
        .btn-secondary:focus {
            outline: none;
        }
        /* 复制按钮新样式（蓝色边框+文字，白色背景） */
        .btn-copy {
            background-color: white;
            color: #0096ff;
            border: 1px solid #0096ff;
            transition: all 0.2s;
            outline: none;
        }
        .btn-copy:hover {
            background-color: #e6f2ff;
        }
        .btn-copy:active {
            background-color: #cce6ff;
        }
        .btn-copy:focus {
            outline: none;
        }

        /* Toast 容器 */
        #toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #f3f4f6;  /* 灰白色背景 */
            color: #1f2937;
            padding: 10px 20px;
            border-radius: 9999px;      /* 胶囊 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e5e7eb;
            /* 进入动画将在 .show 时触发 */
        }

        #toast.show {
            animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes toastIn {
            0% {
                opacity: 0;
                transform: translateX(-50%) scaleX(0.2) scaleY(0.5) translateX(-50px);
            }
            40% {
                opacity: 1;
                transform: translateX(-50%) scaleX(1.1) scaleY(0.9) translateX(0);
            }
            70% {
                transform: translateX(-50%) scaleX(0.95) scaleY(1.05) translateX(0);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) scaleX(1) scaleY(1) translateX(0);
            }
        }

        /* 图标容器 */
        .toast-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
        }

        /* SVG 图标基础样式 */
        .toast-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 成功图标（对勾）描边动画 */
        .toast.success .check-path {
            stroke: #10b981; /* 浅绿色 */
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: drawStroke 0.4s ease-out forwards;
        }

        /* 失败图标（叉）描边动画 */
        .toast.error .cross-path {
            stroke: #ef4444; /* 浅红色 */
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: drawStroke 0.4s ease-out forwards;
        }

        @keyframes drawStroke {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 文字颜色微调 */
        .toast.success .toast-message {
            color: #065f46;
        }
        .toast.error .toast-message {
            color: #991b1b;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <!-- Toast 容器（结构已更新） -->
    <div id="toast">
        <span class="toast-icon"></span>
        <span class="toast-message"></span>
    </div>

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">EggyHub 授权码生成器</h1>
        <p class="text-center text-gray-500 mb-6">输入密码后即可为设备生成授权码</p>

        <!-- 登录表单 -->
        <div id="login-section" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">登录密码</label>
                <input type="password" id="password" placeholder="请输入密码"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0096ff] focus:border-[#0096ff] outline-none transition">
            </div>
            <button onclick="login()"
                class="btn-primary w-full font-semibold py-2 px-4 rounded-lg transition duration-200">
                登录
            </button>
            <div id="login-error" class="text-red-500 text-sm text-center"></div>
        </div>

        <!-- 生成表单（登录后显示） -->
        <div id="generate-section" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">设备ID</label>
                <input type="text" id="device-id" placeholder="例如：SN-12345"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0096ff] focus:border-[#0096ff] outline-none transition">
            </div>
            <button onclick="generate()"
                class="btn-generate w-full font-semibold py-2 px-4 rounded-lg transition duration-200">
                生成授权码
            </button>
            <div id="generate-error" class="text-red-500 text-sm text-center"></div>

            <!-- 授权码显示区域 + 复制按钮 -->
            <div id="result-area" class="hidden">
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative">
                    <p class="text-sm font-medium text-gray-500 mb-1">授权码：</p>
                    <p id="code-display" class="font-mono text-sm break-all text-gray-800 pr-10"></p>
                    <button id="copy-btn" onclick="copyToClipboard()" 
                        class="btn-copy absolute top-2 right-2 rounded-md px-2 py-1 text-xs transition"
                        title="复制到剪贴板">
                        复制
                    </button>
                </div>
            </div>

            <button onclick="logout()"
                class="btn-secondary w-full font-semibold py-2 px-4 rounded-lg transition duration-200">
                退出登录
            </button>
        </div>
    </div>

    <script>
        // 您的 Hugging Face Space 地址
        const API_BASE = 'https://cloudgeniusyun-signer.hf.space';

        // ========== Toast 通知函数（带图标和动画） ==========
        function showToast(message, type = 'success', duration = 2000) {
            const toast = document.getElementById('toast');
            const iconContainer = toast.querySelector('.toast-icon');
            const messageSpan = toast.querySelector('.toast-message');
            
            // 清空之前的图标和类
            iconContainer.innerHTML = '';
            toast.className = ''; 
            
            // 根据类型设置图标和类
            if (type === 'success') {
                toast.classList.add('success', 'show');
                // 对勾 SVG
                iconContainer.innerHTML = `
                    <svg viewBox="0 0 24 24">
                        <path class="check-path" d="M20 6L9 17L4 12" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                `;
            } else {
                toast.classList.add('error', 'show');
                // 叉 SVG (两条线)
                iconContainer.innerHTML = `
                    <svg viewBox="0 0 24 24">
                        <path class="cross-path" d="M18 6L6 18" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <path class="cross-path" d="M6 6L18 18" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    </svg>
                `;
            }
            
            messageSpan.textContent = message;
            
            // 移除之前的定时器
            if (toast.timeoutId) {
                clearTimeout(toast.timeoutId);
            }
            
            // 定时隐藏
            toast.timeoutId = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ========== 复制功能（兼容所有浏览器） ==========
        async function copyToClipboard() {
            const code = document.getElementById('code-display').innerText;
            if (!code) {
                showToast('没有可复制的内容', 'error');
                return;
            }

            // 方法1：使用现代 Clipboard API（需 HTTPS）
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(code);
                    showToast('已复制到剪贴板', 'success');
                    return;
                } catch (err) {
                    console.warn('Clipboard API 失败，尝试传统方法', err);
                }
            }

            // 方法2：传统 document.execCommand 方法
            try {
                const textarea = document.createElement('textarea');
                textarea.value = code;
                textarea.style.position = 'fixed';   // 防止滚动
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                textarea.setSelectionRange(0, 99999); // 兼容移动端
                const successful = document.execCommand('copy');
                document.body.removeChild(textarea);
                if (successful) {
                    showToast('已复制到剪贴板', 'success');
                } else {
                    showToast('复制失败，请手动复制', 'error');
                }
            } catch (err) {
                console.error('复制异常', err);
                showToast('复制失败，请手动复制', 'error');
            }
        }

        // ========== 登录、生成、登出功能 ==========
        async function login() {
            const password = document.getElementById('password').value;
            if (!password) {
                document.getElementById('login-error').innerText = '请输入密码';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('generate-section').classList.remove('hidden');
                    document.getElementById('login-error').innerText = '';
                } else {
                    document.getElementById('login-error').innerText = data.message || '登录失败，请检查密码或网络';
                }
            } catch (err) {
                document.getElementById('login-error').innerText = '网络错误，请稍后重试';
            }
        }

        async function generate() {
            const deviceId = document.getElementById('device-id').value;
            if (!deviceId) {
                document.getElementById('generate-error').innerText = '请输入设备ID';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ device_id: deviceId })
                });
                const data = await res.json();

                if (res.status === 401) {
                    // 未登录或会话过期，退回登录页
                    document.getElementById('login-section').classList.remove('hidden');
                    document.getElementById('generate-section').classList.add('hidden');
                    document.getElementById('login-error').innerText = '会话已过期，请重新登录';
                    return;
                }

                if (res.ok && data.auth_code) {
                    document.getElementById('code-display').innerText = data.auth_code;
                    document.getElementById('result-area').classList.remove('hidden');
                    document.getElementById('generate-error').innerText = '';
                } else {
                    document.getElementById('generate-error').innerText = data.error || '生成失败，请稍后重试';
                }
            } catch (err) {
                document.getElementById('generate-error').innerText = '网络错误，请检查 API 地址或后端状态';
            }
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (e) {}
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('generate-section').classList.add('hidden');
            document.getElementById('password').value = '';
            document.getElementById('device-id').value = '';
            document.getElementById('code-display').innerText = '';
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('login-error').innerText = '';
            document.getElementById('generate-error').innerText = '';
        }

        // 检查是否已登录（刷新后保持登录状态）
        async function checkSession() {
            try {
                const res = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ device_id: 'check' })
                });
                if (res.ok) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('generate-section').classList.remove('hidden');
                }
            } catch (e) {}
        }
        checkSession();
    </script>
</body>
</html>
