<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EggyHub 授权码生成器</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">EggyHub 授权码生成器</h1>
        <p class="text-center text-gray-500 mb-6">输入密码后即可为设备生成授权码</p>

        <!-- 登录表单 -->
        <div id="login-section" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">登录密码</label>
                <input type="password" id="password" placeholder="请输入密码"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>
            <button onclick="login()"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                登录
            </button>
            <div id="login-error" class="text-red-500 text-sm text-center"></div>
        </div>

        <!-- 生成表单（登录后显示） -->
        <div id="generate-section" class="hidden space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">设备ID</label>
                <input type="text" id="device-id" placeholder="例如：SN-12345"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>
            <button onclick="generate()"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                生成授权码
            </button>
            <div id="generate-error" class="text-red-500 text-sm text-center"></div>

            <!-- 授权码显示区域 + 复制按钮 -->
            <div id="result-area" class="hidden">
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative">
                    <p class="text-sm font-medium text-gray-500 mb-1">授权码：</p>
                    <p id="code-display" class="font-mono text-sm break-all text-gray-800 pr-10"></p>
                    <button id="copy-btn" onclick="copyToClipboard()" 
                        class="absolute top-2 right-2 bg-white hover:bg-gray-100 text-gray-600 border border-gray-300 rounded-md px-2 py-1 text-xs transition"
                        title="复制到剪贴板">
                        复制
                    </button>
                </div>
                <div id="copy-message" class="text-green-500 text-sm text-center hidden">已复制！</div>
            </div>

            <button onclick="logout()"
                class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition duration-200">
                退出登录
            </button>
        </div>
    </div>

    <script>
        // 已替换为您的 Hugging Face Space 地址
        const API_BASE = 'https://cloudgeniusyun-signer.hf.space';

        async function login() {
            const password = document.getElementById('password').value;
            if (!password) {
                document.getElementById('login-error').innerText = '请输入密码';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('generate-section').classList.remove('hidden');
                    document.getElementById('login-error').innerText = '';
                } else {
                    document.getElementById('login-error').innerText = data.message || '登录失败，请检查密码或网络';
                }
            } catch (err) {
                document.getElementById('login-error').innerText = '网络错误，请稍后重试';
            }
        }

        async function generate() {
            const deviceId = document.getElementById('device-id').value;
            if (!deviceId) {
                document.getElementById('generate-error').innerText = '请输入设备ID';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ device_id: deviceId })
                });
                const data = await res.json();

                if (res.status === 401) {
                    // 未登录或会话过期，退回登录页
                    document.getElementById('login-section').classList.remove('hidden');
                    document.getElementById('generate-section').classList.add('hidden');
                    document.getElementById('login-error').innerText = '会话已过期，请重新登录';
                    return;
                }

                if (res.ok && data.auth_code) {
                    document.getElementById('code-display').innerText = data.auth_code;
                    document.getElementById('result-area').classList.remove('hidden');
                    document.getElementById('generate-error').innerText = '';
                    // 隐藏之前的复制成功提示
                    document.getElementById('copy-message').classList.add('hidden');
                } else {
                    document.getElementById('generate-error').innerText = data.error || '生成失败，请稍后重试';
                }
            } catch (err) {
                document.getElementById('generate-error').innerText = '网络错误，请检查 API 地址或后端状态';
            }
        }

        async function copyToClipboard() {
            const code = document.getElementById('code-display').innerText;
            if (!code) return;
            try {
                await navigator.clipboard.writeText(code);
                // 显示成功消息
                const msg = document.getElementById('copy-message');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 2000);
            } catch (err) {
                alert('复制失败，请手动复制');
            }
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (e) {}
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('generate-section').classList.add('hidden');
            document.getElementById('password').value = '';
            document.getElementById('device-id').value = '';
            document.getElementById('code-display').innerText = '';
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('login-error').innerText = '';
            document.getElementById('generate-error').innerText = '';
        }

        // 检查是否已登录（可选，保持登录状态刷新页面后仍可看到生成界面）
        async function checkSession() {
            try {
                const res = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ device_id: 'check' })
                });
                if (res.ok) {
                    // 已登录，显示生成页
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('generate-section').classList.remove('hidden');
                }
            } catch (e) {}
        }
        checkSession();
    </script>
</body>
</html>
